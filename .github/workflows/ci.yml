name: H2S-ISRO CI

on: [push, pull_request]

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python3 tests/test_results.py

      - name: Run weight ablation sweep
        run: |
          python3 scripts/ablate_weights.py

      - name: Run synthetic stress test
        run: |
          python3 src/synthetic_stress_test.py
